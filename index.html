<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <h1 id="titulo">Calculadora - JS</h1>

<main class="principal">
    
            <div class="calculadora">
                <table>
                <tr><th colspan="4" id="tela" ></th></tr>
    
                    <tr>
                        <td><button  class="operador" id="limpar" >CE</button></td>
                        <td><button   c lass="operador" id="c" >C</button></td>
                        <td><button  class="operador" id="opedivisao" >%</button></td>
                        <td><button   class="operador" id="del" >DEL</button></td>
                    </tr>
    
                        <tr>
                        <td><button class="botao">7</button></td>
                        <td><button class="botao">8</button></td>
                        <td><button class="botao">9</button></td>
    
                        <td><button  class="operador" id="opemul" >X</button></td>
    
                </tr>
    
                <tr>
                    <td><button class="botao">4</button></td>
                    <td><button class="botao">5</button></td>
                    <td><button class="botao">6</button></td>
    
                    <td><button  class="operador" id="opesub" >-</button></td>
                </tr>
    
                <tr>
                    <td><button class="botao">1</button></td>
                   <td><button  class="botao">2</button></td>
                    <td><button class="botao">3</button></td>
    
                    <td><button  class="operador" id="opesoma" >+</button></td>
                </tr>
    
                <tr>
                    <td><button class="botao">0</button></td>
    
                    <td><button  id="ponto">.</button></td>
    
                <th colspan="2"><button  class="operador" id="opeigual" >=</button></th>
    
                </tr>
    
                </table>
</main>

        </div>

            <footer>

                <p>Desenvolvido por Beatriz</p>

            </footer>

        <script src="aquivo.js"></script>
</body>
</html>
